name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: stunbeacon
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/stunbeacon

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            use_cross: true
            publish_docker: true
            docker_arch: amd64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            use_cross: true
            publish_docker: true
            docker_arch: arm64
          - os: macos-15-intel
            target: x86_64-apple-darwin
            use_cross: false
            publish_docker: false
          - os: macos-14
            target: aarch64-apple-darwin
            use_cross: false
            publish_docker: false

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: 安装 cross
        if: matrix.use_cross
        uses: taiki-e/install-action@cross

      - name: 构建 Release 二进制
        shell: bash
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target "${{ matrix.target }}"
          else
            cargo build --release --target "${{ matrix.target }}"
          fi

      - name: 打包产物
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          PACKAGE_DIR="dist"
          PACKAGE_NAME="${BINARY_NAME}-${VERSION}-${{ matrix.target }}"
          mkdir -p "${PACKAGE_DIR}/${PACKAGE_NAME}"
          cp "target/${{ matrix.target }}/release/${BINARY_NAME}" "${PACKAGE_DIR}/${PACKAGE_NAME}/"
          cp README.md "${PACKAGE_DIR}/${PACKAGE_NAME}/"
          tar -C "${PACKAGE_DIR}" -czf "${PACKAGE_DIR}/${PACKAGE_NAME}.tar.gz" "${PACKAGE_NAME}"

      - name: 准备 Docker 二进制
        if: matrix.publish_docker
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "docker-dist/${{ matrix.docker_arch }}"
          cp "target/${{ matrix.target }}/release/${BINARY_NAME}" "docker-dist/${{ matrix.docker_arch }}/stunbeacon"

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: dist/*.tar.gz

      - name: 上传 Docker 二进制
        if: matrix.publish_docker
        uses: actions/upload-artifact@v4
        with:
          name: docker-${{ matrix.docker_arch }}
          path: docker-dist/${{ matrix.docker_arch }}/stunbeacon

  release:
    name: publish
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: 下载全部构建产物
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: 上传到 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*.tar.gz

  docker:
    name: docker
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Buildx
        uses: docker/setup-buildx-action@v3

      - name: 下载 amd64 Docker 二进制
        uses: actions/download-artifact@v4
        with:
          name: docker-amd64
          path: docker-dist/amd64

      - name: 下载 arm64 Docker 二进制
        uses: actions/download-artifact@v4
        with:
          name: docker-arm64
          path: docker-dist/arm64

      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 生成镜像元数据
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ github.ref_name }}
            type=raw,value=latest

      - name: 构建并推送 Docker 镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.ghcr
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
