name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: stunbeacon

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            use_cross: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            use_cross: true
          - os: macos-15-intel
            target: x86_64-apple-darwin
            use_cross: false
          - os: macos-14
            target: aarch64-apple-darwin
            use_cross: false

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: 安装 cross
        if: matrix.use_cross
        uses: taiki-e/install-action@cross

      - name: 构建 Release 二进制
        shell: bash
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target "${{ matrix.target }}"
          else
            cargo build --release --target "${{ matrix.target }}"
          fi

      - name: 打包产物
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          PACKAGE_DIR="dist"
          PACKAGE_NAME="${BINARY_NAME}-${VERSION}-${{ matrix.target }}"
          mkdir -p "${PACKAGE_DIR}/${PACKAGE_NAME}"
          cp "target/${{ matrix.target }}/release/${BINARY_NAME}" "${PACKAGE_DIR}/${PACKAGE_NAME}/"
          cp README.md "${PACKAGE_DIR}/${PACKAGE_NAME}/"
          tar -C "${PACKAGE_DIR}" -czf "${PACKAGE_DIR}/${PACKAGE_NAME}.tar.gz" "${PACKAGE_NAME}"

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: dist/*.tar.gz

  release:
    name: publish
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: 下载全部构建产物
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: 上传到 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
